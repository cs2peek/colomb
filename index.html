<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agario is a fun and competitive unblocked games.">
    <title>Agario | Agar.io Live Unblocked Games</title>
    <meta name="google" content="notranslate">
    
    <link rel="stylesheet" href="style.css?11">
    
    <script>
        window.aiptag = window.aiptag || {cmd: []};
        aiptag.cmd.display = aiptag.cmd.display || [];
        aiptag.cmd.player = aiptag.cmd.player || [];
        
        let clickCount = 0;
        function show_videoad_limited() {
            clickCount++;
            if (clickCount === 1 || (clickCount - 1) % 2 === 0) {
                if (typeof aiptag.adplayer !== 'undefined') {
                    aiptag.cmd.player.push(function() { aiptag.adplayer.startVideoAd(); });
                } else {
                    playGame();
                }
            } else {
                playGame();
            }
        }
    </script>
    <script async src="//api.adinplay.com/libs/aiptag/pub/AGV/play-unblocked.github.io/tag.min.js"></script>
    
    <style>
        .side-banner { position: fixed; top: 50%; width: 300px; height: 600px; transform: translateY(-50%); z-index: 9999; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .side-banner.left { left: 0; }
        .side-banner.right { right: 0; }
        .bottom-banner { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 728px; height: 90px; z-index: 9999; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: -15px; width: 30px; height: 30px; background: #000; color: #fff; border: none; border-radius: 50%; cursor: pointer; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-color: #f2f2f2; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="videoad"></div>

<section id="main-login-section" class="main-login-section">
    <div id="helloDialog">
        <div class="main-login-area">
            <div class="main-login-area-left">
                <div class="main-login-area-left-tab-area">
                    <button id="mlaltb-settings" onclick="mlaltbsettings()" class="main-login-area-left-tab-button active">Settings</button>
                    <button id="mlaltb-shortcuts" onclick="mlaltbshortcuts()" class="main-login-area-left-tab-button">Shortcuts</button>
                </div>
                <div class="main-login-area-left-panels-area">
                    <div id="mlaltb-settings-panel" class="main-login-area-left-panel-box active">
                        <div class="mlaltb-check-row"><label><input type="checkbox" id="noSkin" onchange="setHideSkins();"> Hide Skins</label></div>
                        <div class="mlaltb-check-row"><label><input type="checkbox" id="noNames" onchange="setHideNames();"> Hide Names</label></div>
                        <div class="mlaltb-check-row"><label><input type="checkbox" id="darkTheme" onchange="setDarkTheme();"> Dark Theme</label></div>
                        <div class="mlaltb-check-row"><label><input type="checkbox" id="showScore" onchange="setShowScore();"> Show Mass</label></div>
                    </div>
                    <div id="mlaltb-shortcuts-panel" class="main-login-area-left-panel-box">
                        <div class="mlaltb-shortcuts-area"><div class="mlaltb-shortcut-box">W</div> Feed</div>
                        <div class="mlaltb-shortcuts-area"><div class="mlaltb-shortcut-box">SPACE</div> Split</div>
                    </div>
                </div>
            </div>

            <div class="main-login-area-center">
                <a href="/"><img src="./imgs/logo.webp" alt="agario" class="main-login-area-center-logo"></a>
                <div class="main-login-area-center-play-area">
                    <div class="mlacpa-name-box">
                        <input placeholder="nick" type="text" id="nick" maxlength="20" value="agar.live">
                    </div>
                    <select class="mlacpa-server-select" id="gamemode" onchange="setserver();">
                        <option value="ffa1.agar.live">FFA 1</option>
                        <option value="ffa2.agar.live">FFA 2</option>
                        <option value="ffa3.agar.live">FFA 3</option>
                        <option value="pop1.agar.live">VIRUS BOMB 1</option>
                    </select>
                    <button class="mlacpa-play-button" onclick="show_videoad_limited(); return false;">PLAY</button>
                    <button class="mlacpa-spectate-button" onclick="spectate(); return false;">Spectate</button>
                </div>
            </div>

            <div class="main-login-area-right">
                <div class="main-login-area-right-tab-area">
                    <button class="main-login-area-right-tab-button active">Skin</button>
                </div>
                <div class="main-login-area-right-panels-area">
                    <div class="main-login-area-right-panel-box active">
                        <div class="mlartb-skin-area">
                            <img id="defaultSkin" src="./skins/noskin.png" style="width:100px;">
                        </div>
                        <button onclick="selectskinmodalopen()" class="mlartb-skin-select-button">Select Skin</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div id="selectskin-modal" class="selectskin-modal">
    <div class="selectskin-modal-inside">
        <div id="idSkinList"></div>
        <button onclick="selectskinmodalclose()">Close</button>
    </div>
</div>

<input type="text" id="chat_textbox" maxlength="70" placeholder="Press Enter to chat!" />

<script src="https://agarlive.site/game3.js?dsdas1"></script>

<script>
    // Sekme değiştirme fonksiyonları
    function mlaltbsettings() {
        document.getElementById("mlaltb-settings-panel").classList.add("active");
        document.getElementById("mlaltb-shortcuts-panel").classList.remove("active");
    }
    function mlaltbshortcuts() {
        document.getElementById("mlaltb-settings-panel").classList.remove("active");
        document.getElementById("mlaltb-shortcuts-panel").classList.add("active");
    }
    function selectskinmodalopen() { document.getElementById("selectskin-modal").classList.add("active"); }
    function selectskinmodalclose() { document.getElementById("selectskin-modal").classList.remove("active"); }

    // Otomatik Sunucu Seçimi
    function getGameMode(){
        const servers = ["ffa1.agar.live", "ffa2.agar.live", "ffa3.agar.live"];
        const gm = localStorage.getItem("gamemode") || servers[0];
        const options = document.querySelectorAll("#gamemode option");
        options.forEach(opt => { if(opt.value == gm) opt.selected = true; });
    }
    getGameMode();
</script>

</body>
</html>
